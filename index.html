 <!DOCTYPE html>
<html>
<head>
    <title>College Admission Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            background: #5a67d8;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>College Admission Form</h1>

    <form>
        <input type="text" placeholder="Enter your name" required>
        <input type="email" placeholder="Enter your email" required>

        <select>
            <option>Select Course</option>
            <option>BCA</option>
            <option>BBA</option>
            <option>BSc IT</option>
        </select>

        <input type="submit" value="Submit">
    </form>
</div>

</body>
</html>
